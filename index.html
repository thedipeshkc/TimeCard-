<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>TimeCard — Work Hours Tracker</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Theme color (browser chrome) -->
  <meta name="theme-color" content="#0c0d10"/>

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TimeCard"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>

  <!-- Android / general -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="application-name" content="TimeCard"/>

  <!-- SEO / share -->
  <meta name="description" content="Track your work hours, calculate overtime pay, and manage shifts. Free, private — everything stays on your device."/>
  <meta property="og:title" content="TimeCard"/>
  <meta property="og:description" content="Professional work hours tracker with overtime calculation and pay estimates."/>
  <meta property="og:type" content="website"/>

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230c0d10'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%234f8ef7' stroke-width='1.5'/%3E%3Cline x1='16' y1='16' x2='16' y2='8' stroke='%234f8ef7' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='21' y2='19' stroke='%23f1f2f5' stroke-width='1.2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='1.2' fill='%234f8ef7'/%3E%3C/svg%3E"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-bg-grid"></div>
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 7v7l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">TimeCard</span>
      </div>
      <div class="login-card">
        <h1 id="login-title" class="login-heading">Welcome back</h1>
        <p id="login-sub" class="login-sub">Sign in to continue tracking your hours.</p>
        <div id="login-error" class="alert alert-error hidden"></div>
        <div class="form-stack" id="login-fields"></div>
        <button class="btn btn-primary btn-full" id="login-submit"></button>
        <p class="login-toggle-text" id="login-toggle-text"></p>
      </div>

      <!-- Install prompt (shown on mobile if not installed) -->
      <div id="install-banner" class="install-banner hidden">
        <div class="install-banner-icon">
          <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 7v7l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="install-banner-text">
          <strong>Add to Home Screen</strong>
          <span>Install TimeCard for quick access</span>
        </div>
        <button class="btn btn-primary btn-sm" id="install-btn">Install</button>
        <button class="btn-icon" id="install-dismiss" title="Dismiss">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 7v7l4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">TimeCard</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-tab="calculator">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7 7h6M7 10h6M7 13h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Calculator
        </button>
        <button class="nav-item" data-tab="timecard">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="5" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M7 3v4M13 3v4M3 9h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Time Card
        </button>
        <button class="nav-item" data-tab="calendar">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Calendar
        </button>
        <button class="nav-item" data-tab="history">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <path d="M4 6h12M4 10h8M4 14h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          History
        </button>
        <button class="nav-item" data-tab="settings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.05 5.05l1.41 1.41M13.54 13.54l1.41 1.41M5.05 14.95l1.41-1.41M13.54 6.46l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Settings
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar"></div>
          <div class="user-details">
            <span class="user-name"  id="sidebar-name"></span>
            <span class="user-email" id="sidebar-email"></span>
          </div>
        </div>
        <button class="btn-icon" id="btn-logout" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path d="M13 3h4v14h-4M8 14l4-4-4-4M12 10H3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">

      <!-- Top bar -->
      <header class="topbar">
        <button class="btn-icon sidebar-toggle" id="sidebar-toggle">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="topbar-title" id="topbar-title">Calculator</div>
        <div class="topbar-actions">
          <button class="btn btn-sm btn-outline" id="btn-export">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
              <path d="M10 3v10M6 9l4 4 4-4M4 15h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Export
          </button>
          <div class="clock-widget" id="live-clock"></div>
        </div>
      </header>

      <!-- Clock-in banner -->
      <div class="clockin-banner" id="clockin-banner">
        <div class="clockin-status">
          <span class="pulse-dot"></span>
          <span id="clockin-label">Not clocked in</span>
        </div>
        <div class="clockin-actions">
          <span class="clockin-timer mono" id="clockin-timer"></span>
          <button class="btn btn-sm btn-clockin" id="btn-clockin">Clock In</button>
        </div>
      </div>

      <!-- Tab content -->
      <div class="tab-content" id="tab-content"></div>
    </main>
  </div>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>

  <script src="app.js"></script>
</body>
</html>
